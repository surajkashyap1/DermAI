services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DERMAI_ENV: development

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api

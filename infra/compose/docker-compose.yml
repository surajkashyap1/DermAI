services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DERMAI_ENV: development
      DERMAI_QDRANT_URL: http://qdrant:6333
    depends_on:
      - qdrant

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api

  qdrant:
    image: qdrant/qdrant:v1.15.4
    healthcheck:
      disable: true
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
